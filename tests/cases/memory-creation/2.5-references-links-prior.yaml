# Test 2.5: References Section Links Prior Work
# When analysis builds on prior entry, References section links to it

name: references-links-prior
description: References section links to prior work

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 15
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob

setup:
  - command: |
      cat > notebook/INDEX.md << 'EOF'
      # Notebook Index

      | Date | Name | Summary |
      |------|------|---------|
      | 2026-01-10 | sample-qc | QC on 1000 samples, removed 23 for low call rate |
      EOF
  - command: |
      cat > notebook/entries/2026-01-10-sample-qc.md << 'EOF'
      # Sample Quality Control

      **Date:** 2026-01-10

      ## Summary
      Performed QC on 1000 samples. Removed 23 samples with call rate <95%.

      ## Details
      Final sample set: 977 samples in data/samples_qc.txt

      ## References
      None
      EOF

prompt: |
  Now that QC is done, calculate the minor allele frequency for each variant in the QC'd samples.

assertions:
  - type: tool_used
    tool: Read
    target_pattern: "sample-qc"
    description: "Should read prior QC entry for context"

  - type: file_created
    path: "notebook/entries/*.md"
    description: "New entry for MAF calculation"

  - type: evaluator
    prompt: |
      The new notebook entry should reference the prior sample-qc work in its References section.

      Does the new entry have a References section that mentions "sample-qc"?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "References should link to sample-qc"
