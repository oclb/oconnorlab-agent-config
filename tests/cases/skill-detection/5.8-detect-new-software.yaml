# Test 5.8: Detect new-software on "learn [tool]"
# "Help me learn jq" triggers new-software skill

name: detect-new-software
description: Detect new-software skill on learn trigger

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 10
  allowed_tools:
    - Read
    - Write
    - Bash
    - Skill
    - WebSearch
    - WebFetch

prompt: |
  Help me learn bcftools for working with VCF files.

assertions:
  - type: output_contains
    pattern: "install|bcftools|VCF|command|example"
    case_insensitive: true
    description: "Should explain the tool"

  - type: evaluator
    prompt: |
      The new-software skill helps learn tools by:
      - Explaining what the tool does
      - Showing installation
      - Providing usage examples
      - Pointing to documentation

      Does the response help learn bcftools (not just define it)?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "Should help learn bcftools"
