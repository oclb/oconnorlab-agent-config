# Test 5.7: Detect support on "what can you do"
# "What can you do?" triggers help/support response

name: detect-support
description: Detect support skill on capability question

config:
  model: haiku
  replicates: 1
  pass_threshold: 1.0
  max_turns: 5
  allowed_tools:
    - Read
    - Skill
    - Glob

prompt: |
  What can you do?

assertions:
  - type: output_contains
    pattern: "skill|analysis|perform|help|capabilit|data|research"
    case_insensitive: true
    description: "Should describe capabilities"

  - type: evaluator
    prompt: |
      The support skill provides an overview of available capabilities.
      It should mention some of: skills, analysis capabilities, data validation, etc.

      Does the response provide an overview of capabilities (not just "I can help")?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "Should overview capabilities"
