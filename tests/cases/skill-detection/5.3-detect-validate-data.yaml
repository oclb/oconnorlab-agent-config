# Test 5.3: Detect new-data on "validate data"
# "Validate this data" triggers new-data skill patterns

name: detect-validate-data
description: Detect new-data skill on validate trigger

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 10
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Skill
  behavior_flags:
    AFK: "true"

setup:
  - command: |
      cat > notebook/INDEX.md << 'EOF'
      # Notebook Index

      | Date | Name | Summary |
      |------|------|---------|
      EOF
  - command: rm -f notebook/entries/*.md 2>/dev/null || true
  - command: |
      cat > data/samples.csv << 'EOF'
      sample_id,age,sex,case_status
      S001,45,M,1
      S002,32,F,0
      S003,58,M,1
      S004,-5,X,0
      S005,41,F,1
      EOF

prompt: |
  Validate the sample data in data/samples.csv before we use it for analysis.

assertions:
  - type: evaluator
    prompt: |
      The new-data skill performs validation checks:
      - Examines format and structure
      - Identifies data types
      - Checks for issues (like invalid values)

      The output should identify issues like the negative age (-5) or invalid sex value (X).

      Does the output identify data quality issues (negative age, invalid sex, etc.)?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "Should identify data issues"

  - type: output_contains
    pattern: "-5|negative|invalid|X|issue|problem|warning"
    case_insensitive: true
    description: "Should flag the problematic values"
