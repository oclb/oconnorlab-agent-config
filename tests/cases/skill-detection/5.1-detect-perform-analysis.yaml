# Test 5.1: Detect perform-analysis on "analyze data"
# "Analyze the data" triggers perform-analysis skill patterns

name: detect-perform-analysis
description: Detect perform-analysis skill on analyze trigger

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 15
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Skill
  behavior_flags:
    AFK: "true"

setup:
  - command: |
      cat > notebook/INDEX.md << 'EOF'
      # Notebook Index

      | Date | Name | Summary |
      |------|------|---------|
      EOF
  - command: rm -f notebook/entries/*.md 2>/dev/null || true
  - command: |
      cat > data/variants.csv << 'EOF'
      variant,maf,info,pvalue
      rs1,0.15,0.95,0.001
      rs2,0.05,0.88,0.05
      rs3,0.22,0.99,0.0001
      rs4,0.08,0.72,0.2
      EOF

prompt: |
  Analyze the variant data in data/variants.csv. How many variants have p < 0.01?

assertions:
  - type: file_created
    path: "notebook/entries/*.md"
    description: "perform-analysis creates notebook entries"

  - type: evaluator
    prompt: |
      The perform-analysis skill follows a structured approach. Check if the output shows evidence of this:
      - Reading the data
      - Performing analysis
      - Displaying results
      - Creating notebook entry

      Does the response show structured analysis work (not just a one-liner answer)?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "Should show structured analysis"

  - type: output_contains
    pattern: "2|two"
    description: "Two variants have p < 0.01 (rs1 and rs3)"
