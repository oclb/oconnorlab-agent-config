# Test 5.6: Detect teaching-mode on "explain how"
# "Explain how to X" triggers teaching mode

name: detect-explain-how
description: Detect teaching-mode on explain how trigger

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 5
  allowed_tools:
    - Read
    - Skill

prompt: |
  Explain how to perform a chi-square test.

assertions:
  - type: output_contains
    pattern: "step|first|then|next|formula|calculate|expected|observed"
    case_insensitive: true
    description: "Should give step-by-step explanation"

  - type: evaluator
    prompt: |
      A teaching-mode explanation of chi-square test should include:
      - What the test is for
      - The formula or calculation steps
      - How to interpret results

      Does this response teach how to perform the test (not just define it)?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "Should teach how to do it"
