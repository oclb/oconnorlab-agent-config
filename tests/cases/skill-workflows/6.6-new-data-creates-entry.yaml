# Test 6.6: new-data - Creates Dataset Entry
# Data validation creates notebook entry documenting the dataset

name: new-data-creates-entry
description: Data validation creates dataset entry

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 15
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Skill
  behavior_flags:
    AFK: "true"

setup:
  - command: |
      cat > notebook/INDEX.md << 'EOF'
      # Notebook Index

      | Date | Name | Summary |
      |------|------|---------|
      EOF
  - command: rm -f notebook/entries/*.md 2>/dev/null || true
  - command: |
      cat > data/genotypes.csv << 'EOF'
      variant,sample1,sample2,sample3
      rs123,0,1,2
      rs456,1,1,0
      rs789,2,0,1
      EOF

prompt: |
  Validate the genotype data in data/genotypes.csv before GWAS.

assertions:
  - type: file_created
    path: "notebook/entries/*.md"
    description: "new-data creates dataset entries"

  - type: evaluator
    prompt: |
      The notebook entry should document the dataset:
      - Location/path
      - Dimensions
      - Data type or format

      Does the entry document the dataset (location, dimensions, format)?
      Answer yes or no.
    pass_if: "yes"
    model: haiku
    description: "Entry should document dataset"
