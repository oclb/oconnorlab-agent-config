# Test 9.5: Invalid Skill Name
# Invalid /skill-name is handled gracefully

name: invalid-skill
description: Invalid skill name handled gracefully

config:
  model: haiku
  replicates: 1
  pass_threshold: 1.0
  max_turns: 3
  allowed_tools:
    - Read
    - Skill

prompt: |
  /nonexistent-skill-xyz

assertions:
  - type: output_contains
    pattern: "not found|unknown|don't recognize|no skill|doesn't exist|available skills|not available"
    case_insensitive: true
    description: "Should indicate skill not found"
