# Test 9.1: /perform-analysis Explicit Call
# /perform-analysis invokes the skill

name: perform-analysis-explicit
description: Explicit /perform-analysis invocation

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 15
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Skill
  behavior_flags:
    AFK: "true"

setup:
  - command: |
      cat > notebook/INDEX.md << 'EOF'
      # Notebook Index

      | Date | Name | Summary |
      |------|------|---------|
      EOF
  - command: rm -f notebook/entries/*.md 2>/dev/null || true
  - command: |
      cat > data/values.csv << 'EOF'
      id,value
      1,10
      2,20
      3,15
      EOF

prompt: |
  /perform-analysis
  Calculate the sum of values in data/values.csv.

assertions:
  - type: skill_invoked
    skill: "perform-analysis"
    description: "Explicit skill invocation"

  - type: file_created
    path: "notebook/entries/*.md"
    description: "Skill creates notebook entry"

  - type: output_contains
    pattern: "45|sum"
    description: "Sum is 10+20+15=45"
