# Test 9.4: /update-notebook Explicit Call
# /update-notebook asks about recent work

name: update-notebook-explicit
description: Explicit /update-notebook invocation

config:
  model: sonnet
  replicates: 1
  pass_threshold: 1.0
  max_turns: 5
  allowed_tools:
    - Read
    - Write
    - Edit
    - Glob
    - Skill

setup:
  - command: |
      cat > notebook/INDEX.md << 'EOF'
      # Notebook Index

      | Date | Name | Summary |
      |------|------|---------|
      | 2026-01-10 | initial-setup | Project initialization |
      EOF
  - command: |
      cat > notebook/entries/2026-01-10-initial-setup.md << 'EOF'
      # Initial Setup

      **Date:** 2026-01-10

      ## Summary
      Set up project structure.

      ## Details
      Created directories and CLAUDE.md.

      ## References
      None
      EOF

prompt: |
  /update-notebook

assertions:
  - type: skill_invoked
    skill: "update-notebook"
    description: "Explicit skill invocation"

  - type: output_contains
    pattern: "[Ww]hat.*done|[Aa]nalyses|[Ww]ork.*outside|[Cc]hanges|[Rr]ecent|[Mm]issed"
    description: "Skill asks about work done outside Claude"
