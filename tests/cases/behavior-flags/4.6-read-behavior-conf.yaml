# Test 4.6: Read behavior.conf at Start
# Claude reads behavior.conf to check flag values

name: read-behavior-conf
description: Reads behavior.conf for flag values

config:
  model: haiku
  replicates: 1
  pass_threshold: 1.0
  max_turns: 5
  allowed_tools:
    - Read
    - Glob

prompt: |
  What environment am I working in according to the behavior flags?

assertions:
  - type: tool_used
    tool: Read
    target_pattern: "behavior.conf"
    description: "Should read the config file"

  - type: output_contains
    pattern: "local|Environment"
    description: "Should report the Environment flag value"
