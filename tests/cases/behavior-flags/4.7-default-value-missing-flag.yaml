# Test 4.7: Default Value When Flag Missing
# Missing flag uses default value

name: default-value-missing-flag
description: Missing flag uses default value

config:
  model: haiku
  replicates: 1
  pass_threshold: 1.0
  max_turns: 5
  allowed_tools:
    - Read
    - Glob

prompt: |
  I have two options for analyzing this data: method A or method B. Which should I use?

assertions:
  - type: output_contains
    pattern: "[Ww]hich|prefer|recommend|depends|more information|context|tell me|details"
    description: "Without AFK=true, should ask for clarification"

  - type: output_not_contains
    pattern: "proceed.*method [AB]|using method [AB]|chose method [AB]|I.ll use method"
    case_insensitive: true
    description: "Should NOT just pick one autonomously"
