name: CI

on:
  push:
    branches: [main]
    paths:
      - 'remote-bridge/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'remote-bridge/**'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            remote-bridge/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('remote-bridge/Cargo.lock') }}

      - name: Check formatting
        working-directory: remote-bridge
        run: cargo fmt --check

      - name: Clippy
        working-directory: remote-bridge
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: remote-bridge
        run: cargo test

  build-check:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: remote-bridge
        run: cargo build --release --target ${{ matrix.target }}
